# permissions for end users to view carstentests.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: operator-test
    app.kubernetes.io/managed-by: kustomize
  name: carstentest-viewer-role
rules:
- apiGroups:
  - cache.carsten-leue.de
  resources:
  - carstentests
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cache.carsten-leue.de
  resources:
  - carstentests/status
  verbs:
  - get
